# Unbound Configuration for GCOT
# This file configures Unbound as the recursive DNS resolver
# It forwards all queries to CoreDNS for policy enforcement

server:
    # Container-friendly runtime: stay root so Docker port 53 and mounted volumes
    # do not depend on the distro unbound user's permissions.
    username: ""

    # Network configuration
    interface: 0.0.0.0
    port: 53
    do-ip6: no
    do-not-query-localhost: no
    access-control: 0.0.0.0/0 allow
    
    # TCP configuration
    tcp-idle-timeout: 30000
    
    # Thread and cache settings
    num-threads: 4
    msg-cache-size: 100m
    rrset-cache-size: 200m
    
    # Performance tuning
    outgoing-range: 8960
    num-queries-per-thread: 4096
    
    # Security settings
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes
    rrset-roundrobin: yes
    
    # DNSSEC validation is disabled here because Unbound forwards to CoreDNS,
    # and minimal containers may not include a populated root trust anchor.
    module-config: "iterator"
    
    # Logging configuration
    logfile: "/var/log/unbound/unbound.log"
    log-queries: yes
    log-replies: yes
    log-tag-queryreply: yes
    verbosity: 1
    
    # Extended statistics for monitoring
    extended-statistics: yes
    statistics-interval: 0
    statistics-cumulative: no
    
    # Caching configuration
    cache-min-ttl: 0
    cache-max-ttl: 30
    prefetch: yes
    prefetch-key: yes
    
    # Local data (empty by default, can be extended)
    # Uncomment to add internal domain support:
    # local-zone: "internal." static
    # local-data: "gateway.internal. IN A 192.168.1.1"

# Forward all DNS queries to CoreDNS for policy enforcement
# CoreDNS runs on port 5053 and enforces GCOT blacklist/whitelist policies
forward-zone:
    name: "."
    # Forward to CoreDNS running in the same container
    forward-addr: 127.0.0.1@5053
    # Policy enforcement should fail closed. Do not bypass CoreDNS if it is
    # unavailable or returns an error.
    forward-first: no

# Remote control configuration (for unbound-control management)
remote-control:
    control-enable: yes
    control-interface: 127.0.0.1
    control-port: 8953
    control-use-cert: no

# Optional: Stub zone configuration for special handling
# Example: Forward specific domains to different resolvers
# stub-zone:
#     name: "special.domain."
#     stub-addr: 192.168.1.2@53

# Optional: Rate limiting to prevent abuse
# rate-limit: 1000
# rate-limit-size: 4m
# rate-limit-slabs: 4
