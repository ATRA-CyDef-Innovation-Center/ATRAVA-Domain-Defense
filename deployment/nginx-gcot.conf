# Nginx bootstrap site config for GCOT Web GUI.
# Certbot will update this file with HTTPS settings after:
# sudo certbot --nginx -d atrava-domain-defense.cisoasaservice.io

server {
    listen 80;
    server_name atrava-domain-defense.cisoasaservice.io 115.147.169.197;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
    }
}
