# Nginx site config for GCOT Web GUI (production)
# Domain: atrava-domain-defense.cisoasaservice.io
# Web GUI public IP: 115.147.169.197
# GCOT node IP: 115.147.169.196

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name atrava-domain-defense.cisoasaservice.io 115.147.169.197;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name atrava-domain-defense.cisoasaservice.io;

    # TLS certs from Let's Encrypt (Certbot will populate these paths)
    ssl_certificate /etc/letsencrypt/live/atrava-domain-defense.cisoasaservice.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atrava-domain-defense.cisoasaservice.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Proxy configuration for Next.js (runs on localhost:3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    # Health endpoint proxy (if app exposes /health)
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
    }

    # Optional: serve static /.well-known for ACME challenges if needed
    location ~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# Notes:
# - Place this file at /etc/nginx/sites-available/gcot and symlink to /etc/nginx/sites-enabled/gcot
# - Run Certbot: sudo certbot --nginx -d atrava-domain-defense.cisoasaservice.io
# - Ensure firewall allows ports 80 and 443.
