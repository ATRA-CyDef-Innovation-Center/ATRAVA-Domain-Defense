services:
    gcot-node:
        build:
            context: ..
            dockerfile: deployment/Dockerfile.gcot-node
        container_name: gcot-node
        restart: unless-stopped
        ports:
            - '80:80/tcp'
            - '443:443/tcp'
            - '53:53/udp'
            - '53:53/tcp'
            - '5053:5053/udp'
            - '5053:5053/tcp'
            - '8080:8080'
        volumes:
            - ../coredns:/var/lib/coredns:rw
            - ../coredns/unbound.conf:/etc/unbound/unbound.conf:ro
            - node-block-page-ca:/var/lib/gcot-block-page
            - node-unbound-data:/var/lib/unbound
            - node-unbound-logs:/var/log/unbound
        env_file:
            - ../agent/.env
        environment:
            COREDNS_CONF_PATH: /var/lib/coredns/Corefile
            BLOCK_PAGE_IP: 115.147.169.196
            BLOCK_PAGE_PORT: 80
            BLOCK_PAGE_HTTPS_PORT: 443
            BLOCK_PAGE_CERT_DIR: /var/lib/gcot-block-page
            NODE_ENV: production
        networks:
            - gcot-network
volumes:
    node-unbound-data:
    node-unbound-logs:
    node-block-page-ca:

networks:
    gcot-network:
        driver: bridge
